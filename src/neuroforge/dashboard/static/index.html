<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroForge Dashboard</title>
  <link rel="stylesheet" href="/static/style.css?v=__CACHE_BUST__">
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header id="header">
    <div class="logo">⚡ NeuroForge</div>
    <div class="controls">
      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button id="btn-mode-live" class="mode-btn mode-active" data-mode="live">Live</button>
        <button id="btn-mode-replay" class="mode-btn" data-mode="replay">Replay</button>
      </div>

      <!-- Live controls -->
      <div id="live-controls" class="control-group">
        <select id="gate-select">
          <option value="AND">AND</option>
          <option value="OR" selected>OR</option>
          <option value="NAND">NAND</option>
          <option value="NOR">NOR</option>
          <option value="XOR">XOR</option>
          <option value="XNOR">XNOR</option>
          <option value="MULTI">MULTI (All 6)</option>
        </select>
        <input id="max-trials" type="number" value="5000" min="100" step="100"
               title="Max trials">
        <select id="device-select" title="Training device">
          <option value="auto" selected>Auto</option>
          <option value="cuda">CUDA</option>
          <option value="cpu">CPU</option>
        </select>
        <button id="btn-train" class="btn-primary">▶ Train</button>
        <button id="btn-stop" class="btn-stop" disabled>⏹ Stop</button>
      </div>

      <!-- Replay controls -->
      <div id="replay-controls" class="control-group" style="display:none">
        <select id="run-select">
          <option value="">— select run —</option>
        </select>
        <button id="btn-load-run" class="btn-primary">📂 Load Run</button>
        <button id="btn-refresh-runs" class="btn-secondary" title="Refresh run list">↻</button>
      </div>

      <span id="status-badge" class="badge badge-idle">idle</span>
    </div>
  </header>

  <!-- ── Run info banner (shown during live training) ───────────── -->
  <div id="run-info-banner" class="run-info-banner" style="display:none">
    <span id="run-info-text"></span>
    <a id="run-info-replay-link" href="#" target="_blank" class="replay-link">▶ Replay this run</a>
  </div>

  <!-- ── Main grid ──────────────────────────────────────────────── -->
  <main id="grid">
    <!-- Run configuration (shown during live training / replay) -->
    <section class="panel" id="panel-config" style="display:none">
      <h2>Run Configuration</h2>
      <div id="config-grid" class="config-grid"></div>
    </section>

    <!-- Left column -->
    <div class="grid-col">
      <section class="panel" id="panel-network">
        <h2>Network Topology</h2>
        <div class="topology-controls">
          <label class="topology-control">
            <span>Edges</span>
            <select id="topology-edge-mode" title="Edge rendering mode">
              <option value="off">Off</option>
              <option value="sampled" selected>Sampled</option>
              <option value="full">Full</option>
            </select>
          </label>
          <label class="topology-control" id="topology-edge-count-wrap">
            <span>Max edges/proj</span>
            <input id="topology-edge-count" type="range" min="20" max="2000" step="10" value="200">
            <span id="topology-edge-count-value">200</span>
          </label>
          <label class="topology-control topology-check">
            <input id="topology-strongest" type="checkbox" checked>
            <span>Show only strongest edges</span>
          </label>
          <label class="topology-control topology-check">
            <input id="topology-detailed-nodes" type="checkbox">
            <span>Detailed nodes</span>
          </label>
        </div>
        <canvas id="canvas-network"></canvas>
        <div id="tooltip" class="tooltip hidden"></div>
      </section>

      <section class="panel" id="panel-truth-table">
        <h2>Truth Table &amp; Confidence</h2>
        <table id="truth-table">
          <thead>
            <tr>
              <th>Input</th><th>Expected</th><th>Predicted</th>
              <th>Confidence</th><th>Trials</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="panel" id="panel-stats">
        <h2>Statistics</h2>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Trial</div>
            <div class="stat-value" id="stat-trial">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Accuracy</div>
            <div class="stat-value" id="stat-accuracy">0%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Converged</div>
            <div class="stat-value" id="stat-converged">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Epoch</div>
            <div class="stat-value" id="stat-epoch">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Gate</div>
            <div class="stat-value" id="stat-gate">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Elapsed</div>
            <div class="stat-value" id="stat-elapsed">—</div>
          </div>
        </div>
      </section>
    </div>

    <!-- Right column -->
    <div class="grid-col">
      <section class="panel" id="panel-accuracy">
        <h2>Training Accuracy</h2>
        <canvas id="canvas-accuracy"></canvas>
      </section>

      <section class="panel" id="panel-weights">
        <h2>Weight Evolution</h2>
        <canvas id="canvas-weights"></canvas>
      </section>

      <section class="panel" id="panel-log">
        <h2>Training Log</h2>
        <div id="log-container"></div>
      </section>
    </div>
  </main>

  <script src="/static/dashboard.js?v=__CACHE_BUST__"></script>
</body>
</html>
